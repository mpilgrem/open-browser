name: Tests

on:
  pull_request:
  push:
    branches:
    - main
  workflow_dispatch:

# As of 2026-06-20, ubuntu-latest and windows-latest come with Stack 3.9.3.
# However, macos-latest does not come with Haskell tools.

jobs:
  build:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        config:
        - stack-ghc-8.4.4.yaml # The oldest GHC supported by Stack
        - stack-ghc-9.10.3.yaml
        - stack-ghc-9.12.4.yaml
        - stack-ghc-9.14.1.yaml
        include:
        # macos-latest provides macOS/AArch64 (M1)
        - os: macos-latest
          config: stack-ghc-9.10.3.yaml
    steps:
    - name: Clone project
      uses: actions/checkout@v4
    - name: Cache dependencies on Unix-like OS
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
      uses: actions/cache@v4
      with:
        path: ~/.stack
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.config }}
    - name: Cache dependencies on Windows
      if: startsWith(runner.os, 'Windows')
      uses: actions/cache@v4
      with:
        path: |
           ~\AppData\Roaming\stack
           ~\AppData\Local\Programs\stack
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.config }}
    - name: Build
      shell: bash
      run: |
        set -ex

        if [[ "${{ matrix.os }}" == "macos-latest" ]]
        then
          # macos-latest does not include Haskell tools as at 2026-06-20.
          curl -sSL https://get.haskellstack.org/ | sh
        fi

        stack --stack-yaml ${{ matrix.config }} build --pedantic --flag open-browser:example --haddock --no-haddock-deps
