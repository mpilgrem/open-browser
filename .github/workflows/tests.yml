name: Tests

on:
  pull_request:
  push:
    branches:
    - main
  workflow_dispatch:

# As of 2026-07-03:
# * ubuntu-latest comes with Stack 3.11.1 and GHC 9.14.1
# * windows-latest comes with Stack 3.11.1 and GHC 9.14.1
# * macos-latest does not come with Haskell tools

jobs:
  build:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        snapshot:
        - stack-ghc-8.4.4.yaml # The oldest GHC supported by Stack
        - stack-ghc-9.10.3.yaml
        - stack-ghc-9.12.4.yaml
        - stack-ghc-9.14.1.yaml
        include:
        # macos-latest provides macOS/AArch64 (M1)
        - os: macos-latest
          snapshot: stack-ghc-9.10.3.yaml
    steps:
    - name: Clone project
      uses: actions/checkout@v7
    - name: Cache dependencies on Unix-like OS
      if: startsWith(runner.os, 'Linux') || startsWith(runner.os, 'macOS')
      uses: actions/cache@v6
      with:
        path: ~/.stack
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.snapshot }}
    - name: Cache dependencies on Windows
      if: startsWith(runner.os, 'Windows')
      uses: actions/cache@v6
      with:
        path: |
           ~\AppData\Roaming\stack
           ~\AppData\Local\Programs\stack
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.snapshot }}
    - name: Build
      shell: bash
      run: |
        set -ex

        if [[ "${{ matrix.os }}" == "macos-latest" ]]
        then
          # As at 2026-07-03:
          #
          # * macos-latest does not include Haskell tools.
          curl -sSL https://get.haskellstack.org/ | sh
        fi

        stack --snapshot ${{ matrix.snapshot }} build --pedantic --flag open-browser:example --haddock --no-haddock-deps
